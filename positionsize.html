<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraderProDXB - Position Sizing</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background-color: #f4efe4; color: #1a1a1a; line-height: 1.6; margin: 0; padding: 20px; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/main/1783747826802.png'); background-repeat: no-repeat; background-position: center; background-size: 50%; opacity: 0.05; z-index: -1; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 300px; height: auto; }
        nav { border-top: 4px solid #1a1a1a; border-bottom: 2px solid #1a1a1a; padding: 15px 0; text-align: center; margin-bottom: 40px; }
        nav a { color: #1a1a1a; text-decoration: none; text-transform: uppercase; margin: 0 10px; font-size: 0.9em; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: #8b0000; }
        main { max-width: 600px; margin: auto; background: rgba(255, 255, 255, 0.4); padding: 30px; border: 1px solid #1a1a1a; border-radius: 5px; }
        h1 { font-family: 'Georgia', serif; text-align: center; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 15px; font-size: 1.8em; margin-bottom: 20px; }
        input, select { padding: 12px; width: 100%; margin-bottom: 15px; border: 1px solid #1a1a1a; background: #f4efe4; box-sizing: border-box; font-family: inherit; }
        .btn { background: #1a1a1a; color: #f4efe4; padding: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%; transition: background 0.3s; }
        .btn:hover { background: #8b0000; }
        #results { margin-top: 25px; border-top: 2px solid #1a1a1a; padding-top: 20px; }
        .result-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 1.1em; }
        @media (max-width: 600px) { .logo-container img { max-width: 200px; } nav a { display: block; margin: 10px 0; } }
    </style>
</head>
<body>
    <div class="logo-container"><img src="https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/main/1783747826802.png" alt="TraderProDXB Logo"></div>
    <nav>
        <a href="index.html">Home</a><a href="blueprint.html">Blueprint</a><a href="infrastructure.html">Infrastructure</a><a href="journey.html">Journey</a><a href="track-record.html">Track Record</a><a href="reflections.html">Reflections</a><a href="positionsize.html">Position Size</a><a href="faq.html">FAQ</a>
    </nav>
    <main>
        <h1>Compounding Calculator</h1>
        <input type="number" id="cap" placeholder="Current Balance (USD)">
        <select id="ticker">
            <option value="" disabled selected>Select Ticker</option>
            <option value="20,125,1,0">USTech (x20)</option>
            <option value="40,250,1,0">Gold (x40)</option>
            <option value="40,1,1,0">XTIUSD (x40)</option>
            <option value="40,0.0017,100000,1">EURUSD/USDJPY (x40)</option>
            <option value="6,500,1,0">BTCUSD (x6)</option>
            <option value="6,25,1,0">ETHUSD (x6)</option>
            <option value="10,5,1,0">TSLA (x10)</option>
        </select>
        <input type="number" id="entry" placeholder="Entry Price">
        <button class="btn" onclick="calc()">CALCULATE POSITION</button>

        <div id="results"></div>

        <script>
            function calc() {
                const cap = parseFloat(document.getElementById('cap').value);
                const entry = parseFloat(document.getElementById('entry').value);
                const tickerData = document.getElementById('ticker').value.split(',');
                if (!cap || !entry || !tickerData[0]) { alert("Please complete all fields."); return; }
                const lev = parseFloat(tickerData[0]), dist = parseFloat(tickerData[1]), divisor = parseFloat(tickerData[2]), isForex = parseInt(tickerData[3]);
                const usable = cap - (cap * 0.0005);
                let rawSize = ((usable * lev) / entry) / (isForex ? divisor : 1);
                let size = Math.round(rawSize / 0.01) * 0.01;
                document.getElementById('results').innerHTML = `
                    <div class="result-row"><span>Position Size:</span> <strong>${size.toFixed(2)}</strong></div>
                    <div class="result-row"><span>TP (6% ROI):</span> <strong>${(entry + dist).toFixed(2)}</strong></div>
                    <div class="result-row"><span>SL (6% ROI):</span> <strong>${(entry - dist).toFixed(2)}</strong></div>
                    <div class="result-row"><span>Win Balance:</span> <strong>$${(cap * 1.06).toFixed(2)}</strong></div>
                    <div class="result-row"><span>Loss Balance:</span> <strong>$${(cap * 0.94).toFixed(2)}</strong></div>
                `;
            }
        </script>
    </main>
</body>
</html>
