<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Position Size Calculator</title>
    <style>
        body { font-family: sans-serif; font-size: 1.2em; line-height: 1.6; padding: 40px; margin: 0; }
        nav { padding: 20px; background: #f4f4f4; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        nav a { font-size: 1.2em; margin-right: 20px; text-decoration: none; color: #333; font-weight: bold; }
        input, select { font-size: 1.1em; padding: 12px; margin: 10px 0; width: 100%; max-width: 400px; display: block; }
        button { font-size: 1.2em; padding: 15px 30px; background: #000; color: #fff; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: #f9f9f9; border-left: 5px solid #000; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="positionsize.html">Position Size</a>
        <a href="journal.html">Journal</a>
    </nav>
    <h1>Position Sizing Calculator</h1>
    <input type="number" id="balance" placeholder="Capital Balance (USD)">
    <select id="ticker">
        <option value="USTech">USTech</option>
        <option value="XAUUSD">XAUUSD</option>
        <option value="WTI">WTI</option>
        <option value="EURUSD">EURUSD</option>
        <option value="USDJPY">USDJPY</option>
        <option value="BTCUSD">BTCUSD</option>
        <option value="ETHUSD">ETHUSD</option>
        <option value="TSLA">TSLA</option>
    </select>
    <input type="number" id="entryPrice" placeholder="Entry Price">
    <button onclick="calculate()">Calculate</button>
    <div id="result">Results will appear here.</div>

    <script>
        function calculate() {
            const bal = parseFloat(document.getElementById('balance').value);
            const ticker = document.getElementById('ticker').value;
            const entry = parseFloat(document.getElementById('entryPrice').value);
            
            if (isNaN(bal) || isNaN(entry)) {
                alert("Please enter valid numbers for Balance and Entry Price.");
                return;
            }

            // TP Logic
            let tp = 25;
            if (bal >= 650 && bal < 1000) tp = 35;
            else if (bal >= 1000 && bal < 1500) tp = 50;
            else if (bal >= 1500 && bal < 2500) tp = 100;
            else if (bal >= 2500) tp = 200;

            const distances = { 
                "USTech": 100, "XAUUSD": 100, "WTI": 10, "EURUSD": 0.0017, 
                "USDJPY": 0.5, "BTCUSD": 500, "ETHUSD": 25, "TSLA": 1 
            };
            
            const dist = distances[ticker];
            const size = tp / dist;
            
            document.getElementById('result').innerHTML = 
                "<p><strong>Target Profit (TP):</strong> $" + tp + "</p>" +
                "<p><strong>Position Size:</strong> " + size.toFixed(4) + "</p>" +
                "<p><strong>Win Exit Price:</strong> " + (entry + (dist/100)).toFixed(2) + "</p>" +
                "<p><strong>Loss Exit Price (SL):</strong> " + (entry - (dist/100)).toFixed(2) + "</p>";
        }
    </script>
</body>
</html>
