<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TraderProDXB Compounding System</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background-color: #f4efe4; color: #1a1a1a; padding: 20px; }
        main { max-width: 600px; margin: auto; background: #fdfaf6; padding: 20px; border: 1px solid #1a1a1a; }
        h1 { text-align: center; text-transform: uppercase; font-size: 1.5em; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; }
        input, select { padding: 10px; width: 100%; margin-bottom: 10px; border: 1px solid #1a1a1a; background: #e0dace; box-sizing: border-box; }
        .btn { background: #1a1a1a; color: #f4efe4; padding: 12px; width: 100%; border: none; cursor: pointer; font-weight: bold; }
        #results { margin-top: 20px; border-top: 2px solid #1a1a1a; padding-top: 10px; }
        .row { display: flex; justify-content: space-between; padding: 4px 0; }
    </style>
</head>
<body>
    <main>
        <h1>TraderProDXB Compounding System</h1>
        <input type="number" id="cap" placeholder="Capital Balance (USD)">
        <select id="ticker" onchange="clearAll()">
            <option value="" disabled selected>Select Ticker</option>
            <option value="12">USTech (12x)</option>
            <option value="12">Gold (12x)</option>
            <option value="12">XTI (12x)</option>
            <option value="50">EurUSD (50x)</option>
            <option value="50">USDJPY (50x)</option>
            <option value="5">BTCUSD (5x)</option>
            <option value="5">EthUSD (5x)</option>
            <option value="5">Tesla (5x)</option>
        </select>
        <select id="dir">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
        </select>
        <input type="number" id="entry" placeholder="Entry Level">
        <button class="btn" onclick="calc()">CALCULATE POSITION</button>
        <div id="results"></div>
    </main>

    <script>
        function clearAll() { document.getElementById('results').innerHTML = ''; }
        function format(num) { return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
        function calc() {
            const cap = parseFloat(document.getElementById('cap').value);
            const entry = parseFloat(document.getElementById('entry').value);
            const lev = parseFloat(document.getElementById('ticker').value);
            const dir = document.getElementById('dir').value;
            
            if (!cap || !entry || !lev) return alert("Complete all fields");

            const dist = (0.06 * entry) / lev;
            const size = Math.round(((cap * lev) / entry) * 100) / 100;
            const grossTP = cap * 0.06;
            const fee = size * 8; 
            const netTP = grossTP - fee;

            document.getElementById('results').innerHTML = `
                <div class="row"><span>Adjusted Size:</span> <strong>${size} Lots</strong></div>
                <div class="row"><span>TP Level:</span> <strong>${format(dir === 'buy' ? entry + dist : entry - dist)}</strong></div>
                <div class="row"><span>SL Level:</span> <strong>${format(dir === 'buy' ? entry - dist : entry + dist)}</strong></div>
                <div class="row"><span>Gross Profit:</span> <strong>$${format(grossTP)}</strong></div>
                <div class="row"><span>Execution Fee:</span> <strong>$${format(fee)}</strong></div>
                <div class="row"><span>Net Win Balance:</span> <strong>$${format(cap + netTP)}</strong></div>
                <div class="row"><span>Net Loss Balance:</span> <strong>$${format(cap - grossTP)}</strong></div>
            `;
        }
    </script>
</body>
</html>
