<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Size Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 1.3em; line-height: 1.6; padding: 0; margin: 0; color: #333; }
        nav { background: #000; padding: 25px; display: flex; flex-wrap: wrap; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1em; }
        main { padding: 40px; max-width: 900px; margin: auto; }
        h1 { font-size: 2em; border-bottom: 2px solid #000; padding-bottom: 10px; }
        input, select, button { font-size: 1em; padding: 15px; margin: 10px 0; width: 100%; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: #f4f4f4; border-left: 5px solid #000; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="blueprint.html">Blueprint</a>
    <a href="infrastructure.html">Infrastructure</a>
    <a href="journey.html">Journey</a>
    <a href="track-record.html">Track Record</a>
    <a href="reflections.html">Reflections</a>
    <a href="positionsize.html">Position Size</a>
    <a href="journal.html">Journal</a>
</nav>
<main>
    <h1>Position Sizing Calculator</h1>
    <input type="number" id="balance" placeholder="Capital Balance (USD)">
    <select id="ticker">
        <option value="USTech">USTech</option>
        <option value="XAUUSD">XAUUSD</option>
        <option value="WTI">WTI</option>
        <option value="EURUSD">EURUSD</option>
        <option value="USDJPY">USDJPY</option>
        <option value="BTCUSD">BTCUSD</option>
        <option value="ETHUSD">ETHUSD</option>
        <option value="TSLA">TSLA</option>
    </select>
    <input type="number" id="entryPrice" placeholder="Entry Price">
    <select id="direction">
        <option value="long">Long</option>
        <option value="short">Short</option>
    </select>
    <button onclick="calculate()">Calculate</button>
    <div id="result">Results will appear here.</div>

    <script>
    function calculate() {
        const bal = parseFloat(document.getElementById('balance').value);
        const ticker = document.getElementById('ticker').value;
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const dir = document.getElementById('direction').value;
        
        // Stage TP Logic
        let tp = 25, prevTp = 15;
        if (bal >= 650 && bal < 1000) { tp = 35; prevTp = 25; }
        else if (bal >= 1000 && bal < 1500) { tp = 50; prevTp = 35; }
        else if (bal >= 1500 && bal < 2500) { tp = 100; prevTp = 50; }
        else if (bal >= 2500) { tp = 200; prevTp = 100; }

        // Ticker Logic: { dist = distance for 1 unit of size, min = min contract allowed }
        const config = {
            "USTech": { dist: 100, min: 0.10 }, "XAUUSD": { dist: 100, min: 0.01 },
            "WTI": { dist: 10, min: 1.0 }, "EURUSD": { dist: 100, min: 0.01 },
            "USDJPY": { dist: 100, min: 0.01 }, "BTCUSD": { dist: 500, min: 0.01 },
            "ETHUSD": { dist: 25, min: 0.01 }, "TSLA": { dist: 5, min: 0.10 }
        };
        
        const data = config[ticker];
        // Calculate size with 10% buffer for net profit
        const rawSize = (tp / data.dist) * 1.1; 
        
        if (rawSize < data.min) {
            document.getElementById('result').innerHTML = "Trade not allowed: Required size (" + rawSize.toFixed(4) + ") is below minimum contract (" + data.min + ").";
            return;
        }

        const slDistance = prevTp / rawSize; 
        const winExit = dir === 'long' ? entry + (data.dist/100) : entry - (data.dist/100);
        const lossExit = dir === 'long' ? entry - (slDistance/100) : entry + (slDistance/100);
        
        document.getElementById('result').innerHTML = 
            `<p><strong>Target Profit (TP):</strong> $${tp}</p>
             <p><strong>Required Size (incl. buffer):</strong> ${rawSize.toFixed(4)}</p>
             <p><strong>Win Exit:</strong> ${winExit.toFixed(2)}</p>
             <p><strong>Loss Exit (SL):</strong> ${lossExit.toFixed(2)}</p>`;
    }
    </script>
</main>
</body>
</html>
