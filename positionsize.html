<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TraderProDXB Compounding System</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background-color: #f4efe4; color: #1a1a1a; line-height: 1.4; margin: 0; padding: 20px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        nav { border-top: 4px solid #1a1a1a; border-bottom: 2px solid #1a1a1a; padding: 10px 0; text-align: center; margin-bottom: 30px; }
        nav a { color: #1a1a1a; text-decoration: none; text-transform: uppercase; margin: 0 8px; font-size: 0.85em; font-weight: bold; }
        nav a:hover { color: #8b0000; }
        main { max-width: 600px; margin: auto; background: #fdfaf6; padding: 20px; border: 1px solid #1a1a1a; }
        h1 { font-family: 'Georgia', serif; text-align: center; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; font-size: 1.8em; }
        input, select { padding: 12px; width: 100%; margin-bottom: 15px; border: 1px solid #1a1a1a; background: #e0dace; box-sizing: border-box; font-family: inherit; }
        .btn { background: #1a1a1a; color: #f4efe4; padding: 12px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%; font-size: 1em; }
        .btn:hover { background: #8b0000; }
        #results { margin-top: 20px; border-top: 2px solid #1a1a1a; padding-top: 15px; font-size: 1.1em; }
        .result-row { display: flex; justify-content: space-between; padding: 5px 0; }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/main/1783747826802.png" alt="TraderProDXB Logo">
    </div>
    <nav>
        <a href="index.html">Home</a><a href="blueprint.html">Blueprint</a><a href="infrastructure.html">Infrastructure</a><a href="journey.html">Journey</a><a href="track-record.html">Track Record</a><a href="reflections.html">Reflections</a><a href="positionsize.html">Position Size</a><a href="journal.html">Journal</a><a href="faq.html">FAQ</a>
    </nav>
    <main>
        <h1>TraderProDXB Compounding System</h1>
        
        <input type="number" id="cap" placeholder="Capital Amount (USD)">
        
        <select id="ticker" onchange="clearAll()">
            <option value="" disabled selected>Select Ticker</option>
            <option value="12,125,1,1">USTech (12x)</option>
            <option value="12,250,1,1">Gold (12x)</option>
            <option value="12,1,1,1">XTI (12x)</option>
            <option value="50,0.001,100000,0">EurUSD (50x)</option>
            <option value="50,0.0017,100000,0">USDJPY (50x)</option>
            <option value="5,500,1,1">BTCUSD (5x)</option>
            <option value="5,25,1,1">EthUSD (5x)</option>
            <option value="5,5,1,1">Tesla (5x)</option>
        </select>

        <input type="number" id="entry" placeholder="Entry Price">
        <button class="btn" onclick="calc()">CALCULATE POSITION</button>

        <div id="results"></div>

        <script>
            window.onload = () => { clearAll(); };
            function clearAll() { 
                document.getElementById('cap').value = ''; 
                document.getElementById('entry').value = ''; 
                document.getElementById('results').innerHTML = ''; 
            }
            function formatCurrency(num) { return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
            function calc() {
                const cap = parseFloat(document.getElementById('cap').value);
                const entry = parseFloat(document.getElementById('entry').value);
                const tickerData = document.getElementById('ticker').value.split(',');
                
                if (!cap || !entry || !tickerData[0]) { alert("Please complete all fields."); return; }

                const lev = parseFloat(tickerData[0]);
                const dist = parseFloat(tickerData[1]);
                const divisor = parseFloat(tickerData[2]);
                const isForex = parseInt(tickerData[3]);
                
                const usable = cap - (cap * 0.0005);
                let rawSize = ((usable * lev) / entry) / (isForex ? 1 : divisor);
                let adjustedSize = Math.round(rawSize / 0.01) * 0.01;
                
                document.getElementById('results').innerHTML = `
                    <div class="result-row"><span>Adjusted Size:</span> <strong>${adjustedSize.toFixed(2)}</strong></div>
                    <div class="result-row"><span>TP Level:</span> <strong>${(entry + dist).toLocaleString('en-US', {minimumFractionDigits: 2})}</strong></div>
                    <div class="result-row"><span>SL Level:</span> <strong>${(entry - dist).toLocaleString('en-US', {minimumFractionDigits: 2})}</strong></div>
                    <div class="result-row"><span>Projected win scenario balance:</span> <strong>$${formatCurrency(cap * 1.06)}</strong></div>
                    <div class="result-row"><span>Projected loss scenario balance:</span> <strong>$${formatCurrency(cap * 0.94)}</strong></div>
                `;
            }
        </script>
    </main>
</body>
</html>
