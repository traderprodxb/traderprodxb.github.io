<html lang="en">

    <meta charset="UTF-8"><title>TraderProDXB - Position Size</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 1.82em; background: #000; color: #A5A9B4; padding: 0; margin: 0; }
        nav { padding: 25px; border-bottom: 4px solid #FF2800; display: flex; flex-direction: column; gap: 15px; }

    <main>
        <h1>Position Size</h1>
        <input type="number" id="bal" placeholder="Capital Balance (USD)">
        <button class="btn" onclick="calc()">CALCULATE</button>
        <div id="out" style="margin-top:20px; font-weight:bold;"></div>
        <script>function calc(){ const b = document.getElementById('bal').value; document.getElementById('out').innerText = "TP: $" + (b*0.12).toFixed(2); }</script>
