<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Position Size Calculator</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 1.82em; background: #1a1a1a; color: #e0e0e0; padding: 0; margin: 0; }
        nav { background: #000; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 3px solid #cc0000; }
        .nav-top { display: flex; justify-content: flex-start; gap: 20px; }
        .nav-bottom { display: flex; justify-content: flex-end; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9em; }
        main { padding: 40px; max-width: 900px; margin: auto; }
        h1 { color: #cc0000; border-bottom: 1px solid #444; padding-bottom: 10px; }
        input, select, button { font-size: 0.9em; padding: 15px; margin: 10px 0; width: 100%; background: #333; color: #fff; border: 1px solid #555; }
        button { background: #cc0000; cursor: pointer; border: none; font-weight: bold; color: #fff; }
        #result { margin-top: 20px; padding: 20px; background: #000; border-left: 5px solid #cc0000; }
    </style>
</head>
<body>
<nav>
    <div class="nav-top"><a href="index.html">Home</a><a href="blueprint.html">Blueprint</a><a href="infrastructure.html">Infrastructure</a><a href="journey.html">Journey</a></div>
    <div class="nav-bottom"><a href="track-record.html">Track Record</a><a href="reflections.html">Reflections</a><a href="positionsize.html">Position Size</a><a href="journal.html">Journal</a></div>
</nav>
<main>
    <h1>Position Size</h1>
    <input type="number" id="balance" placeholder="Capital Balance (USD)">
    <select id="ticker">
        <option value="USTech">USTech</option><option value="XAUUSD">XAUUSD</option>
        <option value="WTI">WTI</option><option value="EURUSD">EURUSD</option>
        <option value="USDJPY">USDJPY</option><option value="BTCUSD">BTCUSD</option>
        <option value="ETHUSD">ETHUSD</option><option value="TSLA">TSLA</option>
    </select>
    <input type="number" id="entryPrice" placeholder="Entry Price">
    <select id="direction"><option value="long">Long</option><option value="short">Short</option></select>
    <button onclick="calculate()">CALCULATE</button>
    <div id="result">Results will appear here.</div>
    <script>
    function calculate() {
        const bal = parseFloat(document.getElementById('balance').value);
        const ticker = document.getElementById('ticker').value;
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const dir = document.getElementById('direction').value;
        const tp = bal * 0.12;
        const prevTp = bal * 0.06;
        const rules = { "USTech": { size: 0.20, dist: 125, factor: 1 }, "XAUUSD": { size: 0.01, dist: 2500, factor: 100 }, "WTI": { size: 25.0, dist: 1.0, factor: 1 }, "EURUSD": { size: 0.25, dist: 100, factor: 10000 }, "USDJPY": { size: 0.25, dist: 100, factor: 100 }, "BTCUSD": { size: 0.05, dist: 500, factor: 1 }, "ETHUSD": { size: 1.0, dist: 25, factor: 1 }, "TSLA": { size: 5.0, dist: 5, factor: 1 } };
        const rule = rules[ticker];
        const scaledSize = rule.size * (tp / 25);
        const move = rule.dist / rule.factor;
        const slMove = (prevTp / (tp / rule.dist)) / rule.factor;
        const winExit = dir === 'long' ? entry + move : entry - move;
        const lossExit = dir === 'long' ? entry - slMove : entry + slMove;
        document.getElementById('result').innerHTML = `<strong>TP:</strong> $${tp.toFixed(2)}<br><strong>Size:</strong> ${scaledSize.toFixed(4)}<br><strong>Win:</strong> ${winExit.toFixed(4)}<br><strong>SL:</strong> ${lossExit.toFixed(4)}`;
    }
    </script>
</main>
</body>
</html>
