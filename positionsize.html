<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraderProDXB - Position Sizing</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; background-color: #f4efe4; color: #1a1a1a; line-height: 1.6; margin: 0; padding: 20px; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/main/1783747826802.png'); background-repeat: no-repeat; background-position: center; background-size: 50%; opacity: 0.05; z-index: -1; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 300px; height: auto; }
        nav { border-top: 4px solid #1a1a1a; border-bottom: 2px solid #1a1a1a; padding: 15px 0; text-align: center; margin-bottom: 40px; }
        nav a { color: #1a1a1a; text-decoration: none; text-transform: uppercase; margin: 0 10px; font-size: 0.9em; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: #8b0000; }
        main { max-width: 600px; margin: auto; background: rgba(255, 255, 255, 0.4); padding: 30px; border: 1px solid #1a1a1a; border-radius: 5px; }
        h1 { font-family: 'Georgia', serif; text-align: center; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 15px; font-size: 1.8em; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 12px; width: 100%; margin-bottom: 10px; border: 1px solid #1a1a1a; background: #f4efe4; box-sizing: border-box; font-family: inherit; }
        #results { margin-top: 25px; border-top: 2px solid #1a1a1a; padding-top: 20px; }
        .result-row { padding: 8px 0; font-size: 1.05em; border-bottom: 1px solid rgba(26,26,26,0.1); }
        @media (max-width: 600px) { .logo-container img { max-width: 200px; } nav a { display: block; margin: 10px 0; } }
    </style>
</head>
<body>
    <div class="logo-container"><img src="https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/main/1783747826802.png" alt="TraderProDXB Logo"></div>
    <nav>
        <a href="index.html">Home</a><a href="blueprint.html">Blueprint</a><a href="infrastructure.html">Infrastructure</a><a href="journey.html">Journey</a><a href="track-record.html">Track Record</a><a href="reflections.html">Reflections</a><a href="positionsize.html">Position Size</a><a href="faq.html">FAQ</a>
    </nav>
    <main>
        <h1>Compounding Calculator</h1>
        
        <label>Account Balance (USD):</label>
        <input type="number" id="balanceInput" value="400" oninput="calculate()">

        <label>Current Entry Price (for TP/SL calculation):</label>
        <input type="number" id="entryInput" placeholder="Enter market price (e.g. 18000)" step="any" oninput="calculate()">

        <div id="results"></div>

        <script>
            function calculate() {
                const balance = parseFloat(document.getElementById('balanceInput').value) || 0;
                const entry = parseFloat(document.getElementById('entryInput').value) || 0;
                
                // Target Profit in USD is strictly 6% ROI of the current balance
                const targetProfitUSD = balance * 0.06;

                const assets = [
                    { name: 'USTech', dist: 150, step: 0.1, unit: 'Lot' },
                    { name: 'XAUUSD', dist: 15, step: 0.01, unit: 'Lot' },
                    { name: 'WTI (XTIUSD)', dist: 1.5, step: 0.1, unit: 'Barrel' },
                    { name: 'EURUSD', dist: 0.0030, step: 0.01, unit: 'Lot' },
                    { name: 'USDJPY', dist: 0.50, step: 0.01, unit: 'Lot' },
                    { name: 'BTCUSD', dist: 500, step: 0.1, unit: 'Coin' },
                    { name: 'ETHUSD', dist: 25, step: 0.1, unit: 'Coin' },
                    { name: 'Tesla', dist: 5, step: 0.1, unit: 'Share' }
                ];

                let html = `<strong>Target Profit (6% ROI): $${targetProfitUSD.toFixed(2)}</strong><br><br>`;
                
                if (entry <= 0) {
                    html += `<div style="color: #8b0000; font-style: italic;">Enter an entry price above to calculate precise TP, SL, and Dynamic Sizes.</div>`;
                }

                assets.forEach(a => {
                    let rawSize = targetProfitUSD / a.dist;
                    let size = Math.round(rawSize / a.step) * a.step;
                    if (size < a.step) size = a.step;

                    let tp = entry > 0 ? (entry + a.dist).toFixed(2) : '---';
                    let sl = entry > 0 ? (entry - a.dist).toFixed(2) : '---';

                    html += `<div class="result-row">
                        <strong>${a.name}</strong>: ${size.toFixed(2)} ${a.unit}<br>
                        <span style="font-size: 0.85em; color: #555;">TP: ${tp} | SL: ${sl}</span>
                    </div>`;
                });

                document.getElementById('results').innerHTML = html;
            }
            calculate();
        </script>
    </main>
</body>
</html>
