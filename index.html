<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraderProDXB</title>
    <style>
        /* Core System Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Uniform Header Section */
        .header {
            padding: 40px 20px 20px;
            border-bottom: 1px solid #1a1a1a;
            background-color: #050505;
        }
        
        /* The Logo Settings */
        .logo-img {
            width: 140px; 
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px; 
        }

        /* Brand Text */
        .brand-text {
            font-weight: 200;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        .brand-text span {
            color: #00ff88;
        }

        /* Main Content Area */
        .content {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            flex: 1; 
        }
        .content p {
            color: #888888;
            line-height: 1.6;
        }

        /* Contact Footer Section */
        .footer {
            padding: 25px;
            border-top: 1px solid #1a1a1a;
            background-color: #050505;
            font-size: 14px;
            color: #666666;
            letter-spacing: 1px;
        }
        .footer a {
            color: #00ff88;
            text-decoration: none;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <!-- Header (Always at the top) -->
    <div class="header">
        <img src="https://raw.githubusercontent.com/traderprodxb/traderprodxb.github.io/78e57a716f86c304a7b211f1ed063f9dadea3f4c/1783747826802.png" alt="TraderProDXB Logo" class="logo-img">
        <h1 class="brand-text">T R A D E R P R O <span>.</span> D X B</h1>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
        <h2>SYSTEM ACTIVE</h2>
        <p>Structure maintained. Awaiting execution parameters.</p>
    </div>

    <!-- Footer (Always at the bottom) -->
    <div class="footer">
        CONTACT: <a href="mailto:traderprodxb@gmail.com">TRADERPRODXB@GMAIL.COM</a>
    </div>

</body>
</html>
